manifest:
  version: "0.1.3"
  schema: https://a2as.org/cert/schema
  subject:
    name: mwanyumba7/obi-kaya
    source: https://github.com/mwanyumba7/obi-kaya
    branch: main
    commit: "9815d1b7"
    scope: [obi_kaya_agent/agent.py]
  issued:
    by: A2AS.org
    at: '2026-02-11T16:40:00Z'
    url: https://a2as.org/certified/agents/mwanyumba7/obi-kaya
  signatures:
    digest: sha256:4mDnZLOYWgnk_zPA03topS5wEqvvMLifiBmNCF1lMv8
    key: ed25519:MCKcp-SaRMIwvWpEbnQ1C3UlDDPm4FfVeKU1DfGkW80
    sig: ed25519:5jKbvuv7OQMSi9cpTSMOSjP11z8wZ2_xbIyHee8XR4G1_67O373WSQGsUiVmtItuZtTDc9M2PlbEsAy0xayPBQ

agents:
  root_agent:
    type: instance
    models: [gemini-2.0-flash-exp]
    tools: [generate_recommendations_from_input, generate_partnership_pitch, answer_community_general_question]
    params:
      name: obi_kaya_agent
      description: 'Smart Community Assistant Agent: Empowers community organizers/managers or anyone in DevRel, especially
        in Sub-Saharan Africa, to maximize their community''s impact, secure partnerships, and sustain engagement. The agent
        analyzes community data, generates actionable recommendations, crafts partnership/sponsorship pitches, and provides
        strategies for ongoing engagement. It is designed to help organizers document and communicate impact, automate partnership
        materials, and maintain vibrant, inclusive communities. The agent is multilingual and can respond in most African
        languages.'
      instruction: ['You are the Smart Community Assistant Agent for community organizers/managers or anyone in DevRel. Your
          core responsibilities are:', '1. Impact Communication & Storytelling:', '- Analyze community data and reports to
          extract key metrics (growth, engagement, demographics).', '- Generate compelling impact stories and summaries using
          numbers, testimonials, and trends.', '- Help organizers document and communicate their community''s value to sponsors,
          members, and the public.', '2. Partnership & Sponsorship Strategy:', '- Create personalized, data-driven partnership/sponsorship
          pitches and decks.', '- Summarize community strengths, engagement, and ROI for potential partners.', '- Suggest
          partnership ideas (e.g., co-hosted events, sponsor branding, exclusive content).', '- Automate and customize materials
          for different organizations.', '3. Engagement & Event Strategy:', '- Recommend event ideas, formats, and optimal
          timing based on community demographics and past engagement.', '- Suggest ways to keep members engaged between events
          (newsletters, online forums, content sharing, etc.).', '- Advise on balancing content for diverse developer interests
          (e.g., AI/ML, Flutter, Angular).', '- Provide actionable plans for both virtual and in-person events, considering
          local context.', '4. Social Media & Communication:', '- Develop channel-specific social media strategies (Twitter/X,
          Instagram, Facebook, WhatsApp, etc.).', '- Draft posts, suggest hashtags, and recommend optimal posting times for
          each platform.', '- Ensure content is consistent, high-quality, and tailored to each channel''s audience and format.',
        '- Advise on campaign planning and content calendars.', '5. Multilingual & Inclusive Support:', '- Respond in most
          African languages as needed, ensuring accessibility for all community organizers/managers or anyone in DevRel in
          SSA.', '- Adapt tone and examples to local context and culture.', 'You must only answer questions or perform actions
          related to:', '- Community impact measurement, documentation, and storytelling', '- Partnership/sponsorship pitch
          generation and strategy', '- Event and engagement strategy for developer communities', '- Social media and communication
          planning for community growth', '- Multilingual support for African GDG organizers', 'If a user asks about anything
          outside these topics, politely respond:', '"Sorry, I am here to support you with Community Impact, Partnerships,
          Engagement, and Communication Strategies for your developer community. Please ask about those topics."', 'Always
          provide clear, actionable, and context-aware guidance. Use any uploaded reports, data, or user input to tailor your
          responses. If a user requests a response in a specific African language, do your best to accommodate.']

models:
  gemini-2.0-flash-exp:
    type: literal
    agents: [root_agent]

tools:
  answer_community_general_question:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Answers general questions about community building, being a tech community organizer, creating and measuring impact, and troubleshooting Bevy platform issues.
        - Uses Gemini to answer based on best practices, referenced resources, and Bevy support documentation.
        - If the question is about Bevy, the tool will search https://help.bevy.com/hc/en-us/categories/22880458639767-Community-Enterprise-Pro for relevant answers.
        - For general community questions, it draws on:
            - https://bevy.com/b/blog
            - https://fastercapital.com/topics/measuring-and-analyzing-community-growth-and-impact.html
            - https://davidspinks.substack.com/
        Returns a dict with the question and a detailed answer.
  generate_partnership_pitch:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Generate a personalized partnership/sponsorship pitch using community data (text, Google Word, or PDF content).
        The pitch includes:
        - Community Overview (size, demographics, growth)
        - Engagement Metrics (attendance, referrals, trends)
        - Impact Statements (summarized reach and influence)
        - Value Proposition (ROI for sponsors)
        - Next Steps (partnership ideas)
        Uses Gemini 2.0 to:
        - Reference and summarize data from the provided content
        - Phrase each section as a compelling, data-driven pitch
        Returns a dict with status and the pitch (organized by section)
  generate_recommendations_from_input:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Analyze community data (text or PDF content) and return structured, actionable recommendations in three categories:
        - Event Ideas & Timing
        - Social Media Strategy
        - Ongoing Engagement (Beyond Events)
        Uses Gemini 2.0 to:
        - Reference community data, trends, and best practices
        - Phrase each suggestion as an actionable plan, referencing data and best practices
        Returns a dict with status and recommendations (organized by category)

imports:
  Agent: google.adk.agents.Agent
  agent: agent
  datetime: datetime
  Dict: typing.Dict
  genai: google.genai
  json: json
  List: typing.List
  Optional: typing.Optional
  os: os
  types: google.genai.types
  ZoneInfo: zoneinfo.ZoneInfo

functions:
  answer_community_general_question:
    type: sync
    module: obi_kaya_agent.agent
    args: [question]
    params:
      returns: dict
  generate_partnership_pitch:
    type: sync
    module: obi_kaya_agent.agent
    args: [user_text, goal_or_request]
    params:
      returns: dict
  generate_recommendations_from_input:
    type: sync
    module: obi_kaya_agent.agent
    args: [user_text, goal_or_request]
    params:
      returns: dict

networks:
  prompt:
    type: api
    actions: [GET]
    protocols: [https]
    params:
      caller: [answer_community_general_question]
      dynamic: "True"
      variable: prompt
